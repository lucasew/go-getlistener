[tools]
go = "1.22"
golangci-lint = "1.60.1"

[tasks."lint:golangci-lint"]
description = "Run golangci-lint"
run = "golangci-lint run --timeout 5m ./..."

[tasks."lint:vet"]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run all linters"
depends = ["lint:golangci-lint", "lint:vet"]

[tasks.test]
description = "Run unit tests"
run = "go test -v ./..."

[tasks."build:native"]
description = "Build for the host OS"
run = "go build -v ./..."

[tasks."build:windows"]
description = "Cross-compile for Windows (catch //go:build windows breaks)"
run = "GOOS=windows go build -v ./..."

[tasks.build]
description = "Build all targets (build:*)"
depends = ["build:*"]

[tasks.install]
description = "Install dependencies"
run = "go mod download"

[tasks.ci]
description = "Run all CI checks"
depends = ["lint", "test", "build"]
run = "echo 'CI checks completed successfully'"
